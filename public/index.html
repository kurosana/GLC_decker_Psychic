<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeManager - GLC デッキ管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo">PokeManager</div>
        <nav class="nav">
          <button class="nav-item active" data-view="decks">デッキ一覧</button>
          <button class="nav-item" data-view="builder">デッキ編集</button>
          <button class="nav-item" data-view="switcher">デッキ入れ替え</button>
        </nav>
      </aside>

      <main class="main">
        <header class="main-header">
          <h1 id="view-title">デッキ一覧</h1>
          <button id="create-deck-btn" class="primary-btn">＋ 新しいデッキを作成</button>
        </header>

        <!-- デッキ一覧ビュー -->
        <section id="view-decks" class="view active">
          <div id="deck-list" class="deck-list"></div>
        </section>

        <!-- デッキ作成ビュー -->
        <section id="view-builder" class="view">
          <div class="builder-header">
            <label>
              編集するデッキ:
              <select id="builder-deck-select"></select>
            </label>
            <label class="filter-label">
              カード種別:
              <div class="filter-wrap">
                <button type="button" id="card-filter-trigger" class="filter-trigger" aria-haspopup="listbox" aria-expanded="false">すべて</button>
                <div id="card-filter-dropdown" class="filter-dropdown hidden" role="listbox"></div>
                <div id="card-filter-submenu" class="filter-submenu-panel hidden" role="listbox"></div>
              </div>
            </label>
            <span class="hint"
              >カード画像をタップしてこのデッキに追加 / 削除します。基本エネルギーにカーソルを乗せると枚数を調整できます。変更は「変更を保存」するまで反映されません。</span
            >
            <button id="pool-overlay-btn" class="secondary-btn pool-toggle-btn">
              カードプール
            </button>
            <div class="builder-save-row">
              <button id="builder-save-btn" class="primary-btn">変更を保存</button>
              <div id="builder-save-toast" class="save-toast hidden">
                <span class="save-toast-icon">✓</span>
                変更を保存しました！
              </div>
            </div>
          </div>
          <div class="builder-layout">
            <div class="deck-cards">
              <h2>
                このデッキのカード
                <span id="deck-count-label" class="deck-count-label"></span>
              </h2>
              <div id="current-deck-cards" class="card-grid"></div>
            </div>
            <div class="card-pool">
              <h2>カードプール</h2>
              <div id="card-pool-list" class="card-grid"></div>
            </div>
          </div>
        </section>

        <!-- デッキ入れ替えビュー -->
        <section id="view-switcher" class="view">
          <div class="switcher-form">
            <label>
              解体するアクティブデッキ
              <select id="from-deck-select"></select>
            </label>
            <label>
              組みたいデッキ
              <select id="to-deck-select"></select>
            </label>
            <div class="switcher-actions">
              <button id="calc-switch-btn" class="primary-btn">
                入れ替えに必要なカードを表示
              </button>
              <button id="apply-switch-btn" class="primary-btn outline">
                入れ替え完了
              </button>
              <div id="switcher-toast" class="save-toast hidden">
                <span class="save-toast-icon">✓</span>
                入れ替えを反映しました！
              </div>
            </div>
          </div>

          <div class="switcher-result">
            <h2>入れ替えに必要なカード</h2>
            <p class="hint">
              ※ エネルギー (psychic_energy.png) は制限なしとして扱います。
            </p>
            <div class="builder-layout">
              <div class="deck-cards">
                <h2>
                  抜くカード
                </h2>
                <div id="switch-remove-cards" class="card-grid"></div>
              </div>
              <div class="card-pool">
                <h2>入れるカード</h2>
                <div id="switch-add-cards" class="card-grid"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- デッキ作成 / 編集モーダル -->
    <div id="deck-modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="deck-modal-title">デッキを作成</h2>
        <label class="modal-field">
          デッキ名
          <input id="deck-name-input" type="text" placeholder="ピカチュウデッキ など" />
        </label>
        <div class="modal-actions">
          <button id="deck-modal-cancel" class="secondary-btn">キャンセル</button>
          <button id="deck-modal-save" class="primary-btn">保存</button>
        </div>
      </div>
    </div>

    <!-- デッキ確認モーダル -->
    <div id="deck-viewer-modal" class="modal hidden">
      <div class="modal-content deck-viewer-content">
        <h2 id="deck-viewer-title">デッキ確認</h2>
        <div id="deck-viewer-count" class="hint"></div>
        <div id="deck-viewer-grid" class="card-grid"></div>
        <div class="modal-actions">
          <button id="deck-viewer-close" class="secondary-btn">閉じる</button>
        </div>
      </div>
    </div>

    <!-- カードプール オーバーレイ -->
    <div id="pool-modal" class="modal hidden">
      <div class="modal-content deck-viewer-content">
        <div class="pool-modal-header">
          <h2>カードプール</h2>
          <div id="pool-modal-filter-wrap" class="filter-wrap pool-modal-filter"></div>
        </div>
        <div id="pool-modal-grid" class="card-grid"></div>
        <div class="modal-actions">
          <button id="pool-modal-close" class="secondary-btn">閉じる</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
  </html>
